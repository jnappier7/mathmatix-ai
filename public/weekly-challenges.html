  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Challenges | MATHMATIX AI</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      color: #e0e0e0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255, 107, 107, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 142, 83, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* Top bar */
    .page-top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      color: #aaa;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(255,107,107,0.15);
      border-color: rgba(255,107,107,0.3);
      color: #FF6B6B;
    }

    .page-title {
      flex: 1;
    }

    .page-title h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-title p {
      margin: 4px 0 0;
      font-size: 0.9rem;
      color: #888;
    }

    /* Timer banner */
    .timer-banner {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .timer-banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #FF6B6B, #FF8E53, #FFD93D);
    }

    .timer-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 8px;
    }

    .timer-display {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .timer-subtext {
      font-size: 0.8rem;
      color: #666;
    }

    /* Countdown segments */
    .countdown-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 12px 0 8px;
    }

    .countdown-unit {
      text-align: center;
    }

    .countdown-value {
      display: block;
      font-size: 2.25rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .countdown-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-top: 4px;
    }

    .countdown-sep {
      font-size: 2rem;
      color: rgba(255,255,255,0.15);
      line-height: 1;
      align-self: flex-start;
    }

    /* Challenges container */
    .challenges-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }

    .loading i {
      font-size: 2rem;
      color: #FF6B6B;
      animation: spin 1.5s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .page-footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: #555;
    }

    .page-footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-footer a:hover { color: #FF6B6B; }

    @media (max-width: 640px) {
      .page-wrapper { padding: 1rem 1rem 2rem; }
      .page-title h1 { font-size: 1.4rem; }
      .page-title p { font-size: 0.8rem; }
      .timer-banner { padding: 1.25rem 1rem; margin-bottom: 1.5rem; }
      .countdown-value { font-size: 1.75rem; }
      .countdown-sep { font-size: 1.5rem; }
      .countdown-row { gap: 1rem; margin: 8px 0 6px; }
      .challenges-card { padding: 1rem; }
      .back-btn { width: 40px; height: 40px; border-radius: 10px; }
    }

    @media (max-width: 400px) {
      .page-wrapper { padding: 0.75rem 0.75rem 1.5rem; }
      .page-top-bar { gap: 0.5rem; }
      .page-title h1 { font-size: 1.2rem; }
      .page-title p { font-size: 0.75rem; }
      .timer-banner { padding: 1rem 0.75rem; border-radius: 12px; }
      .timer-label { font-size: 0.7rem; letter-spacing: 1px; }
      .countdown-value { font-size: 1.5rem; }
      .countdown-sep { font-size: 1.25rem; }
      .countdown-label { font-size: 0.6rem; }
      .countdown-row { gap: 0.75rem; }
      .timer-subtext { font-size: 0.7rem; }
      .challenges-card { padding: 0.85rem; border-radius: 12px; }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <div class="page-top-bar">
      <button class="back-btn" onclick="window.location.href='/badge-map.html'" aria-label="Back to Badge Map">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="page-title">
        <h1>Weekly Challenges</h1>
        <p>Complete challenges to earn bonus XP and special rewards</p>
      </div>
    </div>

    <div class="timer-banner">
      <div class="timer-label"><i class="fas fa-clock"></i> Resets In</div>
      <div class="countdown-row" id="countdown-row">
        <div class="countdown-unit">
          <span class="countdown-value" id="cd-days">-</span>
          <span class="countdown-label">Days</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit">
          <span class="countdown-value" id="cd-hours">-</span>
          <span class="countdown-label">Hours</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit">
          <span class="countdown-value" id="cd-min">-</span>
          <span class="countdown-label">Min</span>
        </div>
      </div>
      <div class="timer-subtext">Challenges reset every Monday at midnight</div>
    </div>

    <div class="challenges-card">
      <div id="challenges-container">
        <div class="loading">
          <div><i class="fas fa-spinner"></i></div>
          <p>Loading weekly challenges...</p>
        </div>
      </div>
    </div>

    <footer class="page-footer">
      &copy; 2026 MATHMATIX AI. All rights reserved.
      <a href="/privacy-policy.html">Privacy Policy</a> |
      <a href="/terms.html">Terms of Use</a>
    </footer>
  </div>

  <script src="/js/storage-utils.js"></script>
  <script src="/js/auto-logout.js"></script>
  <script src="/js/csrf.js"></script>
  <script src="/js/weeklyChallenges.js"></script>
  <script>
    const challengeManager = new WeeklyChallengeManager();

    async function loadChallenges() {
      await challengeManager.loadChallenges();
      challengeManager.renderToContainer(document.getElementById('challenges-container'));
      updateTimer();
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateTimer() {
      const response = challengeManager.challenges;
      if (!response) return;

      const now = new Date();
      const weekStart = new Date(challengeManager.weekStart);
      const nextMonday = new Date(weekStart);
      nextMonday.setDate(nextMonday.getDate() + 7);

      const diff = Math.max(0, nextMonday - now);
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

      document.getElementById('cd-days').textContent = pad(days);
      document.getElementById('cd-hours').textContent = pad(hours);
      document.getElementById('cd-min').textContent = pad(minutes);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadChallenges();
      setInterval(updateTimer, 60000);
    });
  </script>
</body>
</html>
