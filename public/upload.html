  <main class="login-page-wrapper"> <h2>Upload a Worksheet or Image</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="fileInput">Select File:</label>
        <input type="file" name="file" id="fileInput" required />
      </div>
      <button type="submit" class="submit-btn btn-primary">Upload</button>
    </form>

    <h3>Extracted Text:</h3>
    <pre id="output"></pre>
  </main>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const file = document.getElementById('fileInput').files[0];
      if (!file) {
        output.textContent = 'Please select a file to upload.';
        output.style.color = '#e74c3c';
        return;
      }
      const formData = new FormData();
      formData.append('file', file);

      const output = document.getElementById('output');
      output.style.color = '';
      output.textContent = 'Processing file...'; // Show processing message

      try {
        const res = await fetch('/api/upload', { // CHANGED: Fetch to /api/upload
          method: 'POST',
          body: formData,
          credentials: 'include' // Ensure session is sent
        });

        if (!res.ok) {
          const errorData = await res.json(); // Attempt to parse error as JSON
          throw new Error(errorData.error || `HTTP error! status: ${res.status}`);
        }

        const data = await res.json();
        const extracted = data.extractedText || data.extracted || '';
        output.textContent = extracted
          ? `Extracted Text:\n${extracted}\n\nHead back to chat when you're ready to work through it together.`
          : "Couldn't read anything from that file — try a sharper photo or a clearer PDF.";
      } catch (err) {
        console.error("Upload fetch error:", err);
        output.style.color = '#e74c3c';
        output.textContent = "An error occurred during upload. Please try again. Ensure it's a valid image or PDF.\n\nDetails: " + err.message;
      }
    });
  </script>
