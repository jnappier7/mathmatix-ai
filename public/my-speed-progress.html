  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(76, 175, 80, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(139, 195, 74, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* Top bar */
    .page-top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      color: #aaa;
      transition: all 0.2s;
      text-decoration: none;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(76,175,80,0.15);
      border-color: rgba(76,175,80,0.3);
      color: #4caf50;
    }

    .page-title {
      flex: 1;
    }

    .page-title h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4caf50, #8bc34a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-title p {
      margin: 4px 0 0;
      font-size: 0.9rem;
      color: #888;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 4px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .toggle-button {
      flex: 1;
      display: inline-block;
      padding: 10px 18px;
      background: transparent;
      color: #888;
      border: none;
      border-radius: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      text-align: center;
    }

    .toggle-button:hover {
      color: #ccc;
      background: rgba(255,255,255,0.04);
    }

    .toggle-button.active {
      background: linear-gradient(135deg, #4caf50, #388e3c);
      color: white;
      box-shadow: 0 2px 8px rgba(76,175,80,0.3);
    }

    /* Families grid */
    .families-grid {
      display: grid;
      gap: 16px;
    }

    /* Speed progress card - dark theme override */
    .speed-progress-card {
      background: rgba(255,255,255,0.04) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 16px !important;
      padding: 1.5rem !important;
      transition: all 0.25s;
      color: #e0e0e0 !important;
    }

    .speed-progress-card:hover {
      border-color: rgba(255,255,255,0.15) !important;
      transform: translateY(-2px);
    }

    .speed-progress-card h3 {
      color: #e0e0e0 !important;
      margin: 0 0 4px !important;
      font-size: 1.1rem !important;
    }

    .speed-progress-card .speed-subtitle {
      color: #888 !important;
      font-size: 0.85rem !important;
    }

    .speed-progress-card .gauge-value {
      color: #fff !important;
      font-size: 1.75rem !important;
      font-weight: 700 !important;
    }

    .speed-progress-card .gauge-label {
      color: #888 !important;
      font-size: 0.75rem !important;
    }

    .speed-progress-card .gauge-arrow {
      color: #555 !important;
      font-size: 1.5rem !important;
    }

    .speed-progress-card .speed-bar {
      background: rgba(255,255,255,0.06) !important;
      border-radius: 6px !important;
      height: 8px !important;
    }

    .speed-progress-card .speed-bar-fill {
      background: linear-gradient(90deg, #4caf50, #8bc34a) !important;
      border-radius: 6px !important;
    }

    .speed-progress-card .speed-percentage {
      color: #aaa !important;
      font-size: 0.85rem !important;
    }

    .speed-progress-card .improvement-badge {
      background: rgba(76,175,80,0.15) !important;
      color: #4caf50 !important;
      border-radius: 8px !important;
      padding: 8px 14px !important;
      font-weight: 600 !important;
      font-size: 0.85rem !important;
    }

    .speed-progress-card .speed-success {
      background: rgba(76,175,80,0.1) !important;
      border: 1px solid rgba(76,175,80,0.2) !important;
      border-radius: 10px !important;
      padding: 10px 14px !important;
      color: #4caf50 !important;
      font-weight: 600 !important;
      text-align: center !important;
      margin-top: 12px !important;
    }

    .speed-progress-card a {
      color: #4caf50 !important;
    }

    .speed-progress-card a:hover {
      color: #8bc34a !important;
    }

    /* Unlock message */
    .unlock-message {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .unlock-message h3 {
      margin: 0 0 12px;
      font-size: 1.3rem;
      color: #ccc;
    }

    .unlock-message p {
      margin: 0;
      font-size: 0.95rem;
      color: #888;
    }

    /* Footer */
    .page-footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: #555;
    }

    .page-footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-footer a:hover { color: #4caf50; }

    @media (max-width: 640px) {
      .page-wrapper { padding: 1rem 1rem 2rem; }
      .page-title h1 { font-size: 1.4rem; }
      .page-title p { font-size: 0.8rem; }
      .mode-toggle { max-width: 100%; padding: 3px; }
      .toggle-button { padding: 9px 14px; font-size: 0.8rem; }
      .families-grid { gap: 12px; }
      .speed-progress-card { padding: 1.25rem !important; }
      .speed-progress-card .gauge-value { font-size: 1.5rem !important; }
      .unlock-message { padding: 2rem 1.5rem; }
      .back-btn { width: 40px; height: 40px; border-radius: 10px; }
    }

    @media (max-width: 400px) {
      .page-wrapper { padding: 0.75rem 0.75rem 1.5rem; }
      .page-top-bar { gap: 0.5rem; }
      .page-title h1 { font-size: 1.2rem; }
      .page-title p { font-size: 0.75rem; }
      .mode-toggle { border-radius: 10px; }
      .toggle-button { padding: 8px 10px; font-size: 0.75rem; border-radius: 7px; }
      .families-grid { gap: 10px; }
      .speed-progress-card { padding: 1rem !important; border-radius: 12px !important; }
      .speed-progress-card h3 { font-size: 1rem !important; }
      .speed-progress-card .gauge-value { font-size: 1.35rem !important; }
      .speed-progress-card .gauge-arrow { font-size: 1.25rem !important; }
      .speed-progress-card .speed-percentage { font-size: 0.8rem !important; }
      .unlock-message { padding: 1.5rem 1rem; border-radius: 12px; }
      .unlock-message h3 { font-size: 1.1rem; }
      .unlock-message p { font-size: 0.85rem; }
    }

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="/js/celerationChart.js"></script>
  <script>
    async function loadAllProgress() {
      try {
        const response = await fetch('/api/celeration/overview');
        const data = await response.json();

        if (!data.success || data.families.length === 0) {
          document.getElementById('unlockMessage').style.display = 'block';
          return;
        }

        renderFamiliesProgress(data.families);
      } catch (error) {
        console.error('Error loading progress:', error);
      }
    }

    function renderFamiliesProgress(families) {
      const container = document.getElementById('progressContainer');

      container.innerHTML = families.map(family => {
        const improvement = family.celeration ? Math.round((family.celeration - 1) * 100) : 0;
        const emoji = improvement > 20 ? '🚀' : improvement > 10 ? '📈' : improvement > 0 ? '➡️' : '🔄';
        const progressPercent = Math.min((family.currentRate / family.aim) * 100, 100);

        return `
          <div class="speed-progress-card">
            <div class="speed-header">
              <h3>${emoji} ${family.displayName}</h3>
              <div class="speed-subtitle">${family.operation}</div>
            </div>

            <div class="speed-gauge">
              <div class="gauge-current">
                <div class="gauge-value">${family.currentRate}</div>
                <div class="gauge-label">digits/min</div>
              </div>
              <div class="gauge-arrow">→</div>
              <div class="gauge-goal">
                <div class="gauge-value">${family.aim}</div>
                <div class="gauge-label">goal</div>
              </div>
            </div>

            <div class="speed-bar-container">
              <div class="speed-bar">
                <div class="speed-bar-fill" style="width: ${progressPercent}%"></div>
              </div>
              <div class="speed-percentage">${Math.round(progressPercent)}% there!</div>
            </div>

            ${improvement > 0 ? `
              <div class="speed-improvement">
                <div class="improvement-badge">
                  Getting ${improvement}% faster each week!
                </div>
              </div>
            ` : ''}

            ${family.atAim ? `
              <div class="speed-success">
                🎉 You're FLUENT! You can recall these facts automatically!
              </div>
            ` : family.mastered ? `
              <div class="speed-success">
                🏆 MASTERED! Keep practicing to stay sharp!
              </div>
            ` : ''}

            <div style="text-align: center; margin-top: 15px;">
              <a href="/celeration.html?operation=${family.operation}&family=${family.familyName}">
                View Detailed Chart →
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadAllProgress();
    });
  </script>
