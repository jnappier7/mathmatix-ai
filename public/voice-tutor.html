<head>

  <meta charset="UTF-8" />

  <title>M∆THM∆TIΧ — Voice Tutor</title>
  <link rel="stylesheet" href="/css/base/variables.css?v=3" />
  <link rel="stylesheet" href="/css/voice-tutor.css?v=3" />
  <link rel="stylesheet" href="/css/dark-mode.css?v=3" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/vendor/katex/katex.min.css" />
  <script defer src="/vendor/katex/katex.min.js"></script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WDF79L47"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <!-- Ambient background -->
  <div class="vt-ambient">
    <div class="vt-ambient-gradient"></div>
    <canvas id="vt-particle-canvas"></canvas>
  </div>

  <!-- Top bar -->
  <header class="vt-header">
<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=

    <a href="/chat.html" class="vt-back-btn" title="Back to chat">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="vt-header-center">
      <img src="/images/mathmatix-ai-logo.png" alt="Mathmatix" class="vt-logo" />
      <span class="vt-session-label">Voice Session</span>
      <span class="vt-session-timer" id="vt-session-timer">00:00</span>
    </div>
    <div class="vt-header-actions">
      <button id="vt-settings-btn" class="vt-icon-btn" title="Settings" aria-label="Settings">
        <i class="fas fa-sliders-h"></i>
      </button>
    </div>
  </header>

  <!-- Main content area -->
  <main class="vt-main">
    <!-- Left: Visual panel — three defined zones stacked vertically -->
    <section class="vt-visual-panel">
      <!-- Zone 1: Math steps (scrollable, fills remaining space) -->
      <div class="vt-canvas-area" id="vt-canvas-area">
        <div class="vt-canvas-placeholder" id="vt-canvas-placeholder">
          <p><i class="fas fa-function"></i> Equations appear here as you talk</p>
        </div>
        <div id="vt-math-display" class="vt-math-display"></div>
        <canvas id="vt-graph-canvas" class="vt-graph-canvas" style="display:none;"></canvas>
      </div>

      <!-- Zone 2: Live transcript speech bubble -->
      <div class="vt-live-transcript" id="vt-live-transcript">
        <div class="vt-transcript-text" id="vt-transcript-text"></div>
      </div>

      <!-- Zone 3: Tutor avatar presence (fixed at bottom) -->
      <div class="vt-presence" id="vt-presence">
        <div class="vt-presence-rings">
          <div class="vt-ring vt-ring-outer"></div>
          <div class="vt-ring vt-ring-mid"></div>
          <div class="vt-ring vt-ring-inner"></div>
        </div>
        <div class="vt-avatar-circle" id="vt-avatar-circle">
          <img id="vt-tutor-face" alt="Tutor" class="vt-tutor-face" />
          <canvas id="vt-orb-waveform" width="200" height="200" class="vt-waveform-overlay"></canvas>
        </div>
        <div class="vt-presence-glow"></div>
        <div class="vt-presence-status" id="vt-orb-status">
          <span class="vt-status-dot"></span>
          <span class="vt-status-text" id="vt-status-text" aria-live="polite">Tap to begin</span>
        </div>
      </div>
    </section>

    <!-- Right: Chat transcript panel -->
    <aside class="vt-chat-panel" id="vt-chat-panel">
      <div class="vt-chat-header">
        <div class="vt-tutor-info">
          <img id="vt-tutor-avatar" alt="Tutor" class="vt-tutor-avatar" />
          <div>
            <div class="vt-tutor-name" id="vt-tutor-name">Tutor</div>
            <div class="vt-tutor-status" id="vt-tutor-status">Ready</div>
          </div>
        </div>
        <button id="vt-toggle-chat" class="vt-icon-btn vt-chat-toggle" title="Toggle transcript" aria-label="Toggle transcript">
          <i class="fas fa-comments"></i>
        </button>
      </div>
      <div class="vt-chat-messages" id="vt-chat-messages" role="log" aria-live="polite">
        <!-- Messages will be appended here -->
      </div>
      <div class="vt-chat-input-bar">
        <input type="text" id="vt-text-input" placeholder="Type if you prefer..." class="vt-text-input" />
        <button id="vt-send-text" class="vt-send-btn" title="Send" aria-label="Send message">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </aside>
  </main>

  <!-- Bottom controls -->
  <footer class="vt-controls">
    <div class="vt-control-group">
      <button id="vt-end-btn" class="vt-control-btn vt-end-btn" title="End session" aria-label="End session">
        <i class="fas fa-phone-slash"></i>
      </button>
      <span class="vt-control-label">End</span>
    </div>
    <div class="vt-control-group">
      <button id="vt-mic-btn" class="vt-control-btn vt-mic-btn" title="Tap to speak" aria-label="Tap to speak">
        <div class="vt-mic-ripple"></div>
        <i class="fas fa-microphone"></i>
      </button>
    </div>
    <div class="vt-control-group">
      <button id="vt-mute-btn" class="vt-control-btn vt-mute-btn" title="Mute tutor" aria-label="Mute tutor">
        <i class="fas fa-volume-up"></i>
      </button>
      <span class="vt-control-label">Mute</span>
    </div>
  </footer>

  <!-- Settings drawer -->
  <div class="vt-settings-drawer" id="vt-settings-drawer">
    <div class="vt-settings-content">
      <h3>Voice Settings</h3>
      <label class="vt-setting">
        <span>Hands-free mode</span>
        <input type="checkbox" id="vt-handsfree-toggle" checked />
      </label>
      <label class="vt-setting">
        <span>Auto-listen after response</span>
        <input type="checkbox" id="vt-autolisten-toggle" checked />
      </label>
      <label class="vt-setting">
        <span>Show math visuals</span>
        <input type="checkbox" id="vt-visuals-toggle" checked />
      </label>
      <label class="vt-setting">
        <span>Silence timeout</span>
        <select id="vt-silence-timeout">
          <option value="800">0.8s (fastest)</option>
          <option value="1200" selected>1.2s (normal)</option>
          <option value="2000">2s (relaxed)</option>
          <option value="3000">3s (extra relaxed)</option>
        </select>
      </label>
      <button id="vt-settings-close" class="vt-btn-close">Done</button>
    </div>
  </div>

  <script src="/js/csrf.js"></script>
  <script src="/js/voice-tutor-session.js?v=3"></script>
</body>
</html>
