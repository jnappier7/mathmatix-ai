<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bio Tutor - Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
  <script src="/js/csrf.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0fdf4;
      color: #2c3e50;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 2px solid #27ae60;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 {
      font-size: 1.1rem;
      color: #27ae60;
    }
    .header h1 i { margin-right: 6px; }
    .chapter-select {
      font-size: 0.75rem;
      background: #e8f5e9;
      color: #27ae60;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
      border: 1px solid #c8e6c9;
      cursor: pointer;
      outline: none;
      max-width: 220px;
    }
    .chapter-select:focus { border-color: #27ae60; }
    .header-right a {
      font-size: 0.8rem;
      color: #7f8c8d;
      text-decoration: none;
    }
    .header-right a:hover { color: #27ae60; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .msg.ai .msg-avatar { background: #e8f5e9; color: #27ae60; }
    .msg.user .msg-avatar { background: #e3f2fd; color: #1976d2; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .msg.ai .msg-bubble {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-top-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: #27ae60;
      color: #fff;
      border-top-right-radius: 4px;
    }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code {
      background: rgba(0,0,0,0.06);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .msg-bubble pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-bubble ul, .msg-bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .msg-bubble strong { font-weight: 600; }

    /* ── Thinking indicator ── */
    .thinking {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      font-size: 0.8rem;
      color: #7f8c8d;
    }
    .thinking.visible { display: flex; align-items: center; gap: 8px; }
    .dot-pulse { display: flex; gap: 4px; }
    .dot-pulse span {
      width: 6px; height: 6px;
      background: #27ae60;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Input ── */
    .input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }
    .input-area textarea:focus { border-color: #27ae60; }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #27ae60;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #219a52; }
    .send-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    @media (max-width: 600px) {
      .msg { max-width: 95%; }
      .messages { padding: 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1><i class="fas fa-dna"></i> Bio Tutor</h1>
      <select class="chapter-select" id="chapter-select" style="display:none;">
        <option value="">Loading chapters...</option>
      </select>
    </div>
    <div class="header-right">
      <a href="/bio-chapters.html"><i class="fas fa-book"></i> Chapters</a>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg ai">
      <div class="msg-avatar"><i class="fas fa-dna"></i></div>
      <div class="msg-bubble">
        Hey! I'm your biology tutor. Ask me anything about your textbook chapters — I'll help you understand the concepts, quiz you, or explain things step by step.
      </div>
    </div>
  </div>

  <div class="thinking" id="thinking">
    <div class="dot-pulse"><span></span><span></span><span></span></div>
    Thinking...
  </div>

  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask about biology..." autofocus></textarea>
    <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
  </div>

  <script>
    (function () {
      'use strict';

      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const thinkingEl = document.getElementById('thinking');
      const chapterSelect = document.getElementById('chapter-select');

      let sending = false;
      let chatHistory = []; // Track conversation for multi-turn context
      let selectedChapterId = null;

      // ── Auto-resize textarea ──
      inputEl.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      // ── Send on Enter (Shift+Enter for newline) ──
      inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener('click', sendMessage);

      // ── Send message ──
      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || sending) return;

        sending = true;
        sendBtn.disabled = true;

        // Show user message
        appendMsg('user', text);
        inputEl.value = '';
        inputEl.style.height = 'auto';

        // Show thinking
        thinkingEl.classList.add('visible');
        scrollToBottom();

        try {
          const res = await csrfFetch('/api/bio/chat?stream=true', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ message: text, history: chatHistory, chapterId: selectedChapterId })
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || `Error ${res.status}`);
          }

          // Stream the response
          thinkingEl.classList.remove('visible');
          const aiBubble = appendMsg('ai', '');
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });

            // Parse SSE events
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.type === 'complete') continue;
                  if (parsed.type === 'error') {
                    throw new Error(parsed.message || 'Stream failed');
                  }
                  const content = parsed.chunk;
                  if (content) {
                    fullText += content;
                    renderBubble(aiBubble, fullText);
                    scrollToBottom();
                  }
                } catch {
                  // Plain text chunk
                  fullText += data;
                  renderBubble(aiBubble, fullText);
                  scrollToBottom();
                }
              }
            }
          }

          // Final render
          if (fullText) {
            renderBubble(aiBubble, fullText);
          } else {
            renderBubble(aiBubble, "I had trouble generating a response. Could you try again?");
          }

          // Track history for multi-turn context (cap at 20 messages to match backend)
          chatHistory.push({ role: 'user', content: text });
          chatHistory.push({ role: 'assistant', content: fullText });
          if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

        } catch (err) {
          thinkingEl.classList.remove('visible');
          appendMsg('ai', 'Sorry, something went wrong: ' + err.message);
        } finally {
          sending = false;
          sendBtn.disabled = false;
          inputEl.focus();
          scrollToBottom();
        }
      }

      // ── Append a message bubble ──
      function appendMsg(role, text) {
        const msg = document.createElement('div');
        msg.className = 'msg ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.innerHTML = role === 'ai'
          ? '<i class="fas fa-dna"></i>'
          : '<i class="fas fa-user"></i>';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        if (text) renderBubble(bubble, text);

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        scrollToBottom();
        return bubble;
      }

      // ── Render markdown into a bubble ──
      function renderBubble(bubble, text) {
        if (typeof marked !== 'undefined') {
          const html = marked.parse(text);
          bubble.innerHTML = typeof DOMPurify !== 'undefined'
            ? DOMPurify.sanitize(html)
            : html;
        } else {
          bubble.textContent = text;
        }
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // ── Load chapters into selector ──
      async function loadChapters() {
        try {
          const res = await csrfFetch('/api/bio/chapters/status', { credentials: 'same-origin' });
          if (!res.ok) return;
          const data = await res.json();
          const ready = (data.chapters || []).filter(c => c.processingStatus === 'ready');
          if (ready.length === 0) return;

          chapterSelect.innerHTML = ready
            .map(c => `<option value="${c._id}">Ch. ${c.chapterNumber}: ${c.chapterTitle}</option>`)
            .join('');
          chapterSelect.style.display = 'inline-block';

          // Default to the latest chapter
          selectedChapterId = ready[ready.length - 1]._id;
          chapterSelect.value = selectedChapterId;
        } catch { /* ignore */ }
      }

      chapterSelect.addEventListener('change', function () {
        selectedChapterId = this.value || null;
      });

      loadChapters();
    })();
  </script>
</body>
</html>
