  <meta charset="UTF-8">

  <title>Daily Quests | MATHMATIX AI</title>
  <link rel="stylesheet" href="/style.css">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(118, 75, 162, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page-container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* Top bar */
    .page-top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      color: #aaa;
      transition: all 0.2s;
      text-decoration: none;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(102,126,234,0.15);
      border-color: rgba(102,126,234,0.3);
      color: #667eea;
    }

    .page-title {
      flex: 1;
    }

    .page-title h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-title p {
      margin: 4px 0 0;
      font-size: 0.9rem;
      color: #888;
    }

    /* Stats cards */
    .quest-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1.25rem 0.75rem;
      text-align: center;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }

    .stat-icon {
      font-size: 1.5rem;
      margin-bottom: 6px;
      display: block;
    }

    .stat-number {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      display: block;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    /* Quests container override for dark theme */
    #dailyQuestsContainer {
      margin-bottom: 2rem;
    }

    /* Footer */
    .page-footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: #555;
    }

    .page-footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-footer a:hover { color: #667eea; }

    @media (max-width: 640px) {
      .quest-stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .page-title h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="page-container">
    <div class="page-top-bar">
      <a href="/student-dashboard.html" class="back-btn" aria-label="Back to Dashboard">
        <i class="fas fa-arrow-left" style="font-family: 'Font Awesome 6 Free'; font-weight: 900;">&#xf060;</i>
      </a>
      <div class="page-title">
        <h1>Daily Quests</h1>
        <p>Complete challenges to earn bonus XP and build your streak</p>
      </div>
    </div>

    <!-- Stats Overview -->
    <div class="quest-stats-grid" id="questStats">
      <div class="stat-card">
        <span class="stat-icon">🔥</span>
        <span class="stat-number">-</span>
        <span class="stat-label">Current Streak</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🏆</span>
        <span class="stat-number">-</span>
        <span class="stat-label">Best Streak</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <span class="stat-number">-</span>
        <span class="stat-label">Total Done</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📋</span>
        <span class="stat-number">-</span>
        <span class="stat-label">Today</span>
      </div>
    </div>

    <!-- Daily Quests Widget -->
    <div id="dailyQuestsContainer"></div>

    <footer class="page-footer">
      &copy; 2026 MATHMATIX AI. All rights reserved.
      <a href="/privacy-policy.html">Privacy Policy</a> |
      <a href="/terms.html">Terms of Use</a>
    </footer>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="/js/dailyQuests.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await dailyQuestManager.loadQuests();
      await loadQuestStats();
    });

    async function loadQuestStats() {
      try {
        const response = await fetch('/api/daily-quests/stats');
        const data = await response.json();

        if (data.success) {
          const { stats } = data;

          const statsContainer = document.getElementById('questStats');
          statsContainer.innerHTML = `
            <div class="stat-card">
              <span class="stat-icon">🔥</span>
              <span class="stat-number">${stats.currentStreak}</span>
              <span class="stat-label">Current Streak</span>
            </div>
            <div class="stat-card">
              <span class="stat-icon">🏆</span>
              <span class="stat-number">${stats.longestStreak}</span>
              <span class="stat-label">Best Streak</span>
            </div>
            <div class="stat-card">
              <span class="stat-icon">✅</span>
              <span class="stat-number">${stats.totalQuestsCompleted}</span>
              <span class="stat-label">Total Done</span>
            </div>
            <div class="stat-card">
              <span class="stat-icon">📋</span>
              <span class="stat-number">${stats.questsCompletedToday}/${stats.totalQuestsToday}</span>
              <span class="stat-label">Today</span>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error loading quest stats:', error);
      }
    }
  </script>
</body>
</html>
