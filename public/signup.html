<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Mathmatix AI - Start Your Math Learning Journey</title>
  <meta name="description" content="Create your free Mathmatix AI account and get started with personalized AI math tutoring. Perfect for students, parents, and teachers." />

  <!-- SEO Meta Tags -->
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mathmatix.ai/signup.html" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mathmatix.ai/signup.html" />
  <meta property="og:title" content="Sign Up | Mathmatix AI" />
  <meta property="og:description" content="Create your account and get started with personalized AI math tutoring. Perfect for students, parents, and teachers." />
  <meta property="og:image" content="https://mathmatix.ai/images/mathmatix-ai-logo.png" />
  <meta property="og:site_name" content="Mathmatix AI" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sign Up | Mathmatix AI" />
  <meta name="twitter:description" content="Create your account and start learning math with AI tutoring." />
  <meta name="twitter:image" content="https://mathmatix.ai/images/mathmatix-ai-logo.png" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
  <link rel="stylesheet" href="css/mobile-fixes.css" />
  <link rel="stylesheet" href="/css/ux-enhancements.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />
  <script src="/js/csrf.js"></script>
  <script src="/js/i18n-translations.js"></script>
  <script src="/js/i18n.js"></script>
  <style>
    .login-page-wrapper {
      background: linear-gradient(135deg, rgba(var(--clr-primary-teal-rgb, 18,179,179), 0.03) 0%, transparent 50%);
    }

    /* Message styling */
    #signup-message {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-sm, 8px);
      font-size: 0.875rem;
      line-height: 1.5;
      text-align: center;
      margin-top: 16px;
    }
    #signup-message.error {
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      color: var(--clr-error-red, #e74c3c);
    }
    #signup-message.success {
      background: rgba(26, 217, 122, 0.08);
      border: 1px solid rgba(26, 217, 122, 0.2);
      color: var(--clr-success-green, #1AD97A);
    }

    /* Two-column name fields on wider screens */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) {
      .name-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body class="landing-page-body">
  <a href="#main-content" class="skip-to-content" data-i18n="misc.skipToContent">Skip to main content</a>
  <header class="landing-header">
    <div class="header-logo-container">
      <img src="/images/mathmatix-ai-logo.png" alt="Mathmatix AI Logo" class="main-logo-hero" />
    </div>
    <nav class="landing-nav">
      </nav>
  </header>

  <main id="main-content" class="login-page-wrapper" style="min-height: calc(100dvh - 140px); overflow-y: auto;">
    <div class="signup-container" style="max-height: none; overflow: visible; margin: 2rem auto;">
      <h2 data-i18n="signup.createAccount">Create Your Account</h2>
      <p class="subtitle" data-i18n="signup.subtitle">Join the future of math learning.</p>
      <form id="signupForm" method="POST" action="/signup">
        <div class="name-row">
          <div class="form-group">
            <label for="firstName" data-i18n="signup.firstName">First Name</label>
            <input type="text" name="firstName" id="firstName" required autocomplete="given-name" placeholder="John" />
          </div>
          <div class="form-group">
            <label for="lastName" data-i18n="signup.lastName">Last Name</label>
            <input type="text" name="lastName" id="lastName" required autocomplete="family-name" placeholder="Doe" />
          </div>
        </div>

        <div class="form-group">
          <label for="email" data-i18n="signup.email">Email Address</label>
          <input type="email" name="email" id="email" required autocomplete="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="username" data-i18n="signup.username">Username</label>
          <input type="text" name="username" id="username" required autocomplete="username" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label for="password" data-i18n="signup.password">Password</label>
          <input type="password" name="password" id="password" required autocomplete="new-password" placeholder="Min 8 chars, 1 uppercase, 1 number" />
        </div>
        <div class="form-group">
          <label for="confirmPassword" data-i18n="signup.confirmPassword">Confirm Password</label>
          <input type="password" name="confirmPassword" id="confirm-password" required autocomplete="new-password" placeholder="Re-enter your password" />
        </div>

        <div class="form-group">
          <label for="role" data-i18n="signup.iAmA">I am a</label>
          <select name="role" id="role" required>
            <option value="student" selected data-i18n="signup.student">Student</option>
            <option value="parent" data-i18n="signup.parent">Parent</option>
          </select>
        </div>

        <div class="form-group" style="display:flex;align-items:center;gap:8px;margin:8px 0 4px;">
          <input type="checkbox" id="hasCodeCheckbox" style="min-width:16px;" />
          <label for="hasCodeCheckbox" id="hasCodeLabel" style="font-size:0.875rem;cursor:pointer;">I have a code to enter</label>
        </div>

        <div id="codeInputGroup" style="display: none;">
          <div id="enrollmentCodeGroup" class="form-group" style="display: none;">
            <label for="enrollmentCode" data-i18n="signup.enrollmentCode">Enrollment Code</label>
            <input type="text" name="enrollmentCode" id="enrollmentCode" placeholder="Enter your teacher's class code" autocomplete="off" />
            <p class="note">Links you to your teacher's class.</p>
          </div>

          <div id="parentInviteCodeGroup" class="form-group" style="display: none;">
            <label for="parentInviteCode" data-i18n="signup.parentInviteCode">Parent's Invite Code</label>
            <input type="text" name="parentInviteCode" id="parentInviteCode" placeholder="e.g. ABC123" autocomplete="off" />
            <p class="note">Links your account to your parent.</p>
          </div>

          <div id="inviteCodeGroup" class="form-group" style="display: none;">
            <label for="inviteCode" data-i18n="signup.childInviteCode">Child's Invite Code</label>
            <input type="text" name="inviteCode" id="inviteCode" placeholder="e.g. MATH-728Q" autocomplete="off" />
            <p class="note">Links your account to your child.</p>
          </div>
        </div>

        <div class="form-group" style="display:flex;align-items:flex-start;gap:8px;margin:12px 0;">
          <input type="checkbox" name="termsAccepted" id="termsAccepted" required style="margin-top:4px;min-width:16px;" />
          <label for="termsAccepted" style="font-size:0.85rem;line-height:1.4;cursor:pointer;">
            I agree to the <a href="/terms.html" target="_blank" style="color:var(--clr-primary-teal, #12b3b3);">Terms of Use</a>
            and <a href="/privacy.html" target="_blank" style="color:var(--clr-primary-teal, #12b3b3);">Privacy Policy</a>.
          </label>
        </div>

        <button type="submit" class="submit-btn btn-primary" data-i18n="signup.createBtn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div id="signup-message" style="display: none;"></div>

      <p class="signup-link">
        <span data-i18n="signup.haveAccount">Already have an account?</span> <a href="/login.html" data-i18n="signup.logInHere">Log in here</a>
      </p>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 M∆THM∆TIΧ AI. <span data-i18n="footer.rights">All rights reserved.</span></p>
    <p>
      <a href="/privacy.html" data-i18n="footer.privacy">Privacy Policy</a> |
      <a href="/terms.html" data-i18n="footer.terms">Terms of Use</a>
    </p>
  </footer>

  <script>
    const roleSelect = document.getElementById("role");
    const hasCodeCheckbox = document.getElementById("hasCodeCheckbox");
    const hasCodeLabel = document.getElementById("hasCodeLabel");
    const codeInputGroup = document.getElementById("codeInputGroup");
    const enrollmentCodeGroup = document.getElementById("enrollmentCodeGroup");
    const inviteCodeGroup = document.getElementById("inviteCodeGroup");
    const parentInviteCodeGroup = document.getElementById("parentInviteCodeGroup");
    const signupForm = document.getElementById("signupForm");
    const signupMessage = document.getElementById("signup-message");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirm-password");

    // Update which code field is visible based on role + checkbox state
    function updateCodeFields() {
      const isChecked = hasCodeCheckbox.checked;
      const role = roleSelect.value;

      // Update label text based on role
      if (role === "parent") {
        hasCodeLabel.textContent = "I have my child's invite code";
      } else {
        hasCodeLabel.textContent = "I have a code to enter";
      }

      // Show/hide the code input area
      codeInputGroup.style.display = isChecked ? "block" : "none";

      // Hide all code fields first
      enrollmentCodeGroup.style.display = "none";
      parentInviteCodeGroup.style.display = "none";
      inviteCodeGroup.style.display = "none";

      // Clear hidden inputs so they don't submit stale values
      if (!isChecked) {
        document.getElementById("enrollmentCode").value = "";
        document.getElementById("parentInviteCode").value = "";
        document.getElementById("inviteCode").value = "";
        return;
      }

      // Show the right field for the role
      if (role === "student") {
        enrollmentCodeGroup.style.display = "block";
        parentInviteCodeGroup.style.display = "block";
      } else if (role === "parent") {
        inviteCodeGroup.style.display = "block";
      }
    }

    // Initial state
    updateCodeFields();

    hasCodeCheckbox.addEventListener("change", updateCodeFields);
    roleSelect.addEventListener("change", updateCodeFields);

    // Handle form submission with Fetch API
    signupForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (password !== confirmPassword) {
          signupMessage.textContent = 'Passwords do not match!';
          signupMessage.className = 'error';
          signupMessage.style.display = 'block';
          return;
        }

        const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
        if (!passwordRegex.test(password)) {
          signupMessage.textContent = 'Password must be at least 8 characters long, include one capital letter, and one number.';
          signupMessage.className = 'error';
          signupMessage.style.display = 'block';
          return;
        }

        if (!document.getElementById('termsAccepted').checked) {
          signupMessage.textContent = 'You must agree to the Terms of Use and Privacy Policy.';
          signupMessage.className = 'error';
          signupMessage.style.display = 'block';
          return;
        }

        const formData = new FormData(signupForm);
        const data = Object.fromEntries(formData.entries());

        signupMessage.style.display = 'none';

        try {
            const response = await csrfFetch('/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                signupMessage.textContent = result.message;
                signupMessage.className = 'success';
                signupMessage.style.display = 'block';

                setTimeout(() => {
                    window.location.href = result.redirect || '/complete-profile.html';
                }, 1500);

            } else {
                signupMessage.textContent = result.message || 'An error occurred during signup.';
                signupMessage.className = 'error';
                signupMessage.style.display = 'block';
            }
        } catch (error) {
            console.error('Signup Error:', error);
            signupMessage.textContent = 'Network error or server unavailable.';
            signupMessage.className = 'error';
            signupMessage.style.display = 'block';
        }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/js/ux-enhancements.js"></script>
</body>
</html>
