<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bio Tutor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .landing {
      text-align: center;
      padding: 40px 24px;
    }
    .logo {
      font-size: 3rem;
      color: #27ae60;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.6rem;
      color: #2c3e50;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #7f8c8d;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }
    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 32px 28px;
      width: 220px;
      text-decoration: none;
      color: #2c3e50;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .card i {
      font-size: 2rem;
      color: #27ae60;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 1rem;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 0.8rem;
      color: #7f8c8d;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="logo"><i class="fas fa-dna"></i></div>
    <h1>Bio Tutor</h1>
    <p class="subtitle">AI-powered biology tutoring from your textbook</p>
    <div class="cards">
      <a href="/bio-chat.html" class="card">
        <i class="fas fa-comments"></i>
        <h2>Start Chatting</h2>
        <p>Ask questions about your biology chapters</p>
      </a>
      <a href="/bio-chapters.html" class="card">
        <i class="fas fa-book-open"></i>
        <h2>Manage Chapters</h2>
        <p>Upload and manage textbook PDFs</p>
      </a>
    </div>
  </div>
</body>
</html>
