  <meta charset="UTF-8" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Subtle animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(18, 179, 179, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(118, 75, 162, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }

    .progress-page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* Header bar */
    .page-top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      color: #aaa;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(18,179,179,0.15);
      border-color: rgba(18,179,179,0.3);
      color: #12B3B3;
    }

    .page-title {
      flex: 1;
    }

    .page-title h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #12B3B3, #667eea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-title p {
      margin: 4px 0 0;
      font-size: 0.9rem;
      color: #888;
    }

    .logout-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #aaa;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.3);
      color: #ef4444;
    }

    /* Stats Ring Cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .stat-card.mastered-card::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .stat-card.learning-card::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .stat-card.ready-card::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

    .stat-ring {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 12px;
    }

    .stat-ring svg {
      width: 80px;
      height: 80px;
      transform: rotate(-90deg);
    }

    .stat-ring .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 6;
    }

    .stat-ring .ring-fill {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease;
    }

    .stat-ring .ring-fill.mastered { stroke: #10b981; }
    .stat-ring .ring-fill.learning { stroke: #3b82f6; }
    .stat-ring .ring-fill.ready { stroke: #f59e0b; }

    .stat-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    /* Section Cards */
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }

    .section:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .section-icon.mastered { background: rgba(16,185,129,0.15); }
    .section-icon.learning { background: rgba(59,130,246,0.15); }
    .section-icon.ready { background: rgba(245,158,11,0.15); }

    .section-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0;
      flex: 1;
      color: #e0e0e0;
    }

    .section-count {
      background: rgba(255,255,255,0.08);
      color: #ccc;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* Skill Items */
    .skill-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skill-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      transition: all 0.25s;
      cursor: default;
    }

    .skill-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateX(4px);
    }

    .skill-item.mastered { border-left: 3px solid #10b981; }
    .skill-item.learning { border-left: 3px solid #3b82f6; }
    .skill-item.ready { border-left: 3px solid #f59e0b; }

    .skill-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .skill-name {
      font-weight: 600;
      font-size: 1rem;
      color: #e0e0e0;
    }

    .skill-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .skill-badge.mastered { background: rgba(16,185,129,0.15); color: #34d399; }
    .skill-badge.learning { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .skill-badge.ready { background: rgba(245,158,11,0.15); color: #fbbf24; }

    .skill-meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 8px;
    }

    .skill-progress {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .skill-progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #3b82f6, #818cf8);
      transition: width 0.6s ease;
    }

    .skill-actions {
      margin-top: 10px;
    }

    .skill-btn {
      background: linear-gradient(135deg, #12B3B3, #0e9494);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .skill-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(18,179,179,0.3);
    }

    /* Empty / Loading States */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }

    .empty-state i {
      font-size: 3.5rem;
      color: rgba(255,255,255,0.1);
      margin-bottom: 1.5rem;
    }

    .empty-state h2 {
      color: #ccc;
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .empty-state p {
      margin: 0 0 1.5rem;
    }

    .loading {
      text-align: center;
      padding: 6rem 2rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #12B3B3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    .loading p { color: #888; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .page-footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: #555;
    }

    .page-footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-footer a:hover { color: #12B3B3; }

    @media (max-width: 768px) {
      .progress-page { padding: 1rem 1rem 2rem; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
      .page-title h1 { font-size: 1.4rem; }
      .stat-ring { width: 56px; height: 56px; }
      .stat-ring svg { width: 56px; height: 56px; }
      .stat-number { font-size: 1.25rem; }
      .stat-label { font-size: 0.7rem; }
      .stat-card { padding: 1rem 0.5rem; }
      .section { padding: 1rem; }
      .skill-item { padding: 0.85rem 1rem; }
      .empty-state { padding: 2.5rem 1.5rem; }
      .loading { padding: 3rem 1rem; }
      .logout-btn { padding: 10px 14px; min-height: 44px; font-size: 0.8rem; }
      .skill-btn { padding: 10px 16px; min-height: 44px; }
    }

    @media (max-width: 400px) {
      .progress-page { padding: 0.75rem 0.75rem 1.5rem; }
      .page-top-bar { gap: 0.5rem; }
      .page-title h1 { font-size: 1.2rem; }
      .page-title p { font-size: 0.8rem; }
      .stats-row { gap: 0.5rem; }
      .stat-ring { width: 48px; height: 48px; }
      .stat-ring svg { width: 48px; height: 48px; }
      .stat-number { font-size: 1.1rem; }
      .stat-label { font-size: 0.65rem; letter-spacing: 0.5px; }
      .stat-card { padding: 0.75rem 0.35rem; border-radius: 12px; }
      .section { padding: 0.85rem; margin-bottom: 1rem; border-radius: 12px; }
      .section-header { gap: 8px; margin-bottom: 1rem; padding-bottom: 0.75rem; }

      .section-title { font-size: 1rem; }
      .skill-item { padding: 0.75rem; border-radius: 10px; }
      .skill-name { font-size: 0.9rem; }
      .skill-badge { font-size: 0.65rem; padding: 2px 8px; }
      .skill-meta { font-size: 0.8rem; }
      .skill-btn { font-size: 0.8rem; padding: 10px 14px; }
      .back-btn { width: 40px; height: 40px; border-radius: 10px; }
      .logout-btn { padding: 8px 10px; font-size: 0.75rem; }
    }
  </style>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 34; // ~213.6

    function animateRing(id, value, total) {
      const ring = document.getElementById(id);
      if (!ring || total === 0) return;
      const pct = Math.min(value / total, 1);
      const offset = CIRCUMFERENCE * (1 - pct);
      requestAnimationFrame(() => {
        ring.style.strokeDashoffset = offset;
      });
    }

    async function init() {
      try {
        const userRes = await fetch('/user');
        if (!userRes.ok) {
          window.location.href = '/login.html';
          return;
        }

        const { user } = await userRes.json();
        if (!user || user.role !== 'student') {
          window.location.href = '/login.html';
          return;
        }

        await loadProgress();

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('progress-content').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading-state').innerHTML =
          '<p style="color: #ef4444;">Error loading progress. <a href="/student-dashboard.html" style="color:#12B3B3;">Go to Dashboard</a></p>';
      }
    }

    async function loadProgress() {
      const res = await fetch('/api/student/progress');
      const data = await res.json();

      if (!data.assessmentCompleted) {
        document.getElementById('progress-content').innerHTML = `
          <div class="page-top-bar">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <div class="page-title"><h1>Your Math Journey</h1></div>
          </div>
          <div class="empty-state">
            <div><i class="fas fa-clipboard-check"></i></div>
            <h2>No Progress Yet</h2>
            <p>Take the assessment to start tracking your progress!</p>
            <button class="skill-btn" onclick="location.href='/assessment.html'">
              <i class="fas fa-rocket"></i> Take Assessment
            </button>
          </div>
        `;
        return;
      }

      const { mastered, learning, ready } = data.progress;
      const { totalMastered, currentlyLearning, readyToLearn } = data.stats;
      const total = totalMastered + currentlyLearning + readyToLearn;

      document.getElementById('stat-mastered').textContent = totalMastered;
      document.getElementById('stat-learning').textContent = currentlyLearning;
      document.getElementById('stat-ready').textContent = readyToLearn;

      document.getElementById('mastered-count').textContent = totalMastered;
      document.getElementById('learning-count').textContent = currentlyLearning;
      document.getElementById('ready-count').textContent = readyToLearn;

      // Animate stat rings
      setTimeout(() => {
        animateRing('ring-mastered', totalMastered, total || 1);
        animateRing('ring-learning', currentlyLearning, total || 1);
        animateRing('ring-ready', readyToLearn, total || 1);
      }, 100);

      renderSkillList('mastered-list', mastered, 'mastered');
      renderSkillList('learning-list', learning, 'learning');
      renderSkillList('ready-list', ready, 'ready');

      if (totalMastered === 0) document.getElementById('mastered-section').style.display = 'none';
      if (currentlyLearning === 0) document.getElementById('learning-section').style.display = 'none';
      if (readyToLearn === 0) document.getElementById('ready-section').style.display = 'none';
    }

    function renderSkillList(listId, skills, type) {
      const container = document.getElementById(listId);

      if (skills.length === 0) {
        container.innerHTML = '<div class="empty-state" style="padding:2rem;"><p>No skills in this category yet.</p></div>';
        return;
      }

      const html = skills.map(skill => {
        const badgeLabel = type === 'mastered' ? 'Mastered' :
                          type === 'learning' ? 'In Progress' : 'Ready';

        let metaText = '';
        if (type === 'mastered' && skill.masteredDate) {
          metaText = `Completed ${formatDate(skill.masteredDate)}`;
        } else if (type === 'learning') {
          const progress = Math.round((skill.masteryScore || 0) * 100);
          metaText = `${progress}% complete`;
        }

        let actionsHtml = '';
        if (type === 'learning') {
          actionsHtml = `
            <div class="skill-actions">
              <button class="skill-btn" onclick="continueSkill('${skill.skillId}')">
                <i class="fas fa-play"></i> Continue
              </button>
            </div>
          `;
        } else if (type === 'ready') {
          actionsHtml = `
            <div class="skill-actions">
              <button class="skill-btn" onclick="startSkill('${skill.skillId}')">
                <i class="fas fa-rocket"></i> Start Learning
              </button>
            </div>
          `;
        }

        let progressBar = '';
        if (type === 'learning') {
          const progress = Math.round((skill.masteryScore || 0) * 100);
          progressBar = `
            <div class="skill-progress">
              <div class="skill-progress-fill" style="width: ${progress}%"></div>
            </div>
          `;
        }

        return `
          <div class="skill-item ${type}">
            <div class="skill-header">
              <div class="skill-name">${skill.displayName}</div>
              <div class="skill-badge ${type}">${badgeLabel}</div>
            </div>
            ${metaText ? `<div class="skill-meta">${metaText}</div>` : ''}
            ${progressBar}
            ${actionsHtml}
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (diffDays === 0) return 'today';
      if (diffDays === 1) return 'yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      return date.toLocaleDateString();
    }

    async function startSkill(skillId) {
      try {
        await fetch('/api/student/start-skill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ skillId })
        });
        window.location.href = '/chat.html';
      } catch (error) {
        console.error('Error starting skill:', error);
        alert('Error starting skill. Please try again.');
      }
    }

    function continueSkill(skillId) {
      window.location.href = '/chat.html';
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await csrfFetch('/logout', { method: 'POST' });
        window.location.href = '/login.html';
      } catch (error) {
        console.error('Logout error:', error);
        window.location.href = '/login.html';
      }
    });

    init();
  </script>
<script src="/js/sessionManager.js"></script>
  <script src="/js/ux-enhancements.js"></script>
</body>
</html>
