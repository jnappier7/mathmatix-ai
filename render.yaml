services:
  - type: web
    name: mathmatix-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: pro

    # HTTP health check — enables zero-downtime deploys. Render waits for this
    # endpoint to return 200 on the new instance before routing traffic and
    # draining the old one, which removes the 502 gap during normal deploys.
    healthCheckPath: /api/health

    # Custom domain with SSL (Render auto-provisions Let's Encrypt certs)
    customDomains:
      - name: mathmatix.ai
      - name: www.mathmatix.ai

    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: NODE_ENV
        value: production

      # Your app's environment variables (set these in Render dashboard)
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CALLBACK_URL
        sync: false
      - key: MATHPIX_APP_ID
        sync: false
      - key: MATHPIX_APP_KEY
        sync: false

      # ── Tutoring feature flags (version-controlled; edit value to roll out) ──
      # NOTE: a flag only does something once its CODE is on main and deployed.
      #
      # Visual Gate — blocks graph/image board commands that would reveal the
      # answer to the student's OWN problem. Secure-by-default. Options:
      #   live_control     enforce, deterministic leak-block only (current)
      #   live_experimental enforce + transform leaks into parallel examples
      #   shadow           log decisions only, render unchanged (observe first)
      #   audit_only       log, don't render experimental
      #   off              full bypass / kill switch
      # Read the corpus at GET /api/admin/visual-gate-decisions.
      - key: VISUAL_GATE_MODE
        value: live_control
      # Visual Gate LLM value judge (decorative-visual filter). Prompt is a first
      # draft / UNVALIDATED — keep off until its shadow decisions are reviewed.
      # The code checks for the literal string 'on'.
      - key: VISUAL_GATE_VALUE_JUDGE
        value: "off"
      # Structured tutor response — makes board_commands a guaranteed array every
      # turn (the board can't be silently skipped). Flip to "true" after checking
      # the structured-tutor metrics dashboard. Code accepts "true" or "1".
      - key: STRUCTURED_TUTOR_RESPONSE
        value: "false"
      # I_DO worked-example board — lets the tutor demonstrate full steps on a
      # PARALLEL example (relaxes the #1 guard, double-gated on a WORKED_EXAMPLE
      # move). REQUIRES fix/board-turn-state merged + deployed, AND a live check
      # that WORKED_EXAMPLE never works the student's own problem. Then flip "true".
      - key: WORKED_EXAMPLE_BOARD
        value: "false"

    autoDeploy: true
