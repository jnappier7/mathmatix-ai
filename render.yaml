services:
  - type: web
    name: mathmatix-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: pro

    # HTTP health check — enables zero-downtime deploys. Render waits for this
    # endpoint to return 200 on the new instance before routing traffic and
    # draining the old one, which removes the 502 gap during normal deploys.
    healthCheckPath: /api/health

    # Custom domain with SSL (Render auto-provisions Let's Encrypt certs)
    customDomains:
      - name: mathmatix.ai
      - name: www.mathmatix.ai

    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: NODE_ENV
        value: production

      # Your app's environment variables (set these in Render dashboard)
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CALLBACK_URL
        sync: false
      - key: MATHPIX_APP_ID
        sync: false
      - key: MATHPIX_APP_KEY
        sync: false

    autoDeploy: true
